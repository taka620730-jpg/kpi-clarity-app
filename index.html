<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIペース × Clarity</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='1' x2='1' y2='0'%3E%3Cstop offset='0' stop-color='%234FD1C5'/%3E%3Cstop offset='1' stop-color='%239B8CF2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%2314161C'/%3E%3Crect x='12' y='38' width='9' height='16' rx='2' fill='url(%23g)'/%3E%3Crect x='27' y='28' width='9' height='26' rx='2' fill='url(%23g)'/%3E%3Crect x='42' y='14' width='9' height='40' rx='2' fill='url(%23g)'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#050a10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KPIペース">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050a10; --surface:rgba(14,26,36,.72); --surface-2:rgba(20,38,50,.85); --line:rgba(56,189,248,.28);
    --text:#E8FBFF; --muted:#5D8CA3;
    --good:#4AFAC4; --good-bg:rgba(74,250,196,.12);
    --warn:#FBBF24; --warn-bg:rgba(251,191,36,.12);
    --bad:#FF5D6C; --bad-bg:rgba(255,93,108,.12);
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --display:'Orbitron','Noto Sans JP',sans-serif;
    --sans:'Noto Sans JP',-apple-system,sans-serif;
    --glow:#38E8FF;
    --k0:#38E8FF; --k1:#7DF9E0; --k2:#FF6FD8; --k3:#8C7CFF; --k4:#5CC8FF; --k5:#6BFFB0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:var(--sans); color:var(--text); padding:22px 16px 60px;
    background:
      repeating-linear-gradient(0deg, rgba(56,232,255,.025) 0px, rgba(56,232,255,.025) 1px, transparent 1px, transparent 3px),
      radial-gradient(ellipse at top, rgba(56,232,255,.09), transparent 55%),
      radial-gradient(ellipse at bottom, rgba(140,124,255,.06), transparent 60%),
      var(--bg);
    min-height:100vh;
  }
  .wrap{max-width:960px;margin:0 auto;position:relative;z-index:1;}

  .app-shell{display:flex;gap:22px;align-items:flex-start;}
  .sidebar{
    width:92px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;
    position:sticky;top:22px;
  }
  .sidebar-item{
    display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;
    border-radius:14px;cursor:pointer;color:var(--muted);border:1px solid transparent;
    background:transparent;transition:all .15s ease;
  }
  .sidebar-item .ic{font-size:20px;line-height:1;}
  .sidebar-item .lb{font-size:10px;font-weight:600;text-align:center;line-height:1.2;}
  .sidebar-item:hover{color:var(--text);background:var(--surface-2);}
  .sidebar-item.active{
    color:var(--text);border-color:var(--glow);background:var(--surface);
    box-shadow:0 0 14px rgba(56,232,255,.15), inset 0 0 8px rgba(56,232,255,.08);
  }
  .main-area{flex:1;min-width:0;}
  @media (max-width:680px){
    .app-shell{flex-direction:column;}
    .sidebar{
      width:100%;flex-direction:row;overflow-x:auto;position:static;
      padding-bottom:4px;
    }
    .sidebar-item{flex:0 0 auto;min-width:64px;}
  }

  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.dash-grid{grid-template-columns:1fr;}}
  .dash-widget{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;}
  .dash-widget-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .dash-widget-title{font-family:var(--display);font-size:15px;font-weight:700;color:var(--k0);}
  .dash-mini-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
  .dash-mini-row:last-child{border-bottom:none;}
  .dash-mini-name{color:var(--text);}
  .dash-mini-val{font-family:var(--mono);color:var(--muted);font-size:11.5px;}
  .dash-bar-track{height:5px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin-top:4px;}
  .dash-bar-fill{height:100%;border-radius:4px;}

  @keyframes hud-pulse{ 0%,100%{opacity:.55;} 50%{opacity:1;} }
  @keyframes hud-spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes scan-sweep{ 0%{transform:translateY(-100%);} 100%{transform:translateY(100vh);} }

  .scanline{position:fixed;left:0;right:0;height:120px;pointer-events:none;z-index:0;
    background:linear-gradient(to bottom, transparent, rgba(56,232,255,.05), transparent);
    animation:scan-sweep 7s linear infinite;}

  .hud-corners{position:relative;}
  .hud-corners::before, .hud-corners::after{
    content:'';position:absolute;width:14px;height:14px;pointer-events:none;
    border-color:var(--glow);opacity:.85;transition:opacity .15s ease;
  }
  .hud-corners::before{top:-1px;left:-1px;border-top:2px solid;border-left:2px solid;border-top-left-radius:6px;}
  .hud-corners::after{bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid;border-bottom-right-radius:6px;}
  .hud-corners:hover::before, .hud-corners:hover::after{opacity:1;filter:drop-shadow(0 0 4px var(--glow));}

  .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:38px;height:38px;border-radius:50%;position:relative;flex-shrink:0;
    background:radial-gradient(circle at center, rgba(56,232,255,.25), rgba(5,10,16,.9) 70%);
    border:1.5px solid var(--glow);
    box-shadow:0 0 10px rgba(56,232,255,.55), inset 0 0 8px rgba(56,232,255,.4);
  }
  .brand-mark::before{
    content:'';position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(56,232,255,.6);
    animation:hud-spin 6s linear infinite;
  }
  .brand-mark::after{
    content:'';position:absolute;inset:15px;border-radius:50%;background:var(--glow);
    box-shadow:0 0 8px 2px var(--glow);animation:hud-pulse 2.2s ease-in-out infinite;
  }
  .brand-mark i{display:none;}
  .brand h1{font-family:var(--display);font-size:18px;font-weight:700;margin:0;letter-spacing:.06em;text-shadow:0 0 12px rgba(56,232,255,.4);}
  .brand .sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;letter-spacing:.03em;}
  .back-btn{font-size:18px;color:var(--muted);margin-right:2px;padding:4px 6px 4px 0;background:none;border:none;cursor:pointer;}
  .back-btn:hover{color:var(--glow);text-shadow:0 0 8px var(--glow);}
  .topbar-btns{display:flex;gap:8px;}
  .btn{border:none;border-radius:6px;padding:9px 15px;font-size:12.5px;font-weight:600;font-family:var(--mono);cursor:pointer;white-space:nowrap;letter-spacing:.03em;}
  .btn-fill{background:linear-gradient(135deg, var(--k0), var(--k3));color:#031014;box-shadow:0 0 14px rgba(56,232,255,.45);}
  .btn-fill:hover{filter:brightness(1.15);box-shadow:0 0 20px rgba(56,232,255,.7);}
  .btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--glow);color:var(--glow);}

  /* Clarity-style tab nav (icon over label, underline on active) */
  .clarity-tabs{display:flex;justify-content:space-around;border-bottom:1px solid var(--line);margin-bottom:20px;}
  .clarity-tab{flex:1;text-align:center;padding:10px 4px 12px;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:var(--mono);}
  .clarity-tab .ic{font-size:19px;display:block;margin-bottom:4px;filter:grayscale(1) brightness(1.4);}
  .clarity-tab .lb{font-size:11px;font-weight:600;letter-spacing:.02em;}
  .clarity-tab.active{color:var(--glow);border-bottom-color:var(--glow);text-shadow:0 0 8px rgba(56,232,255,.6);}
  .clarity-tab.active .ic{filter:none;}

  .empty{text-align:center;padding:70px 20px;color:var(--muted);font-size:14px;}
  .empty-small{text-align:center;padding:30px 10px;color:var(--muted);font-size:13px;}

  /* Hub */
  .hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px;}
  @media (max-width:520px){.hub-grid{grid-template-columns:1fr;}}
  .hub-tile{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:24px 20px;cursor:pointer;transition:border-color .15s ease, transform .15s ease;}
  .hub-tile:hover{border-color:var(--k0);transform:translateY(-2px);}
  .hub-tile-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;}
  .hub-tile-title{font-family:var(--display);font-size:19px;font-weight:700;margin-bottom:6px;}
  .hub-tile-desc{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:14px;}
  .hub-tile-meta{font-size:11px;color:var(--k0);font-family:var(--mono);font-weight:600;border-top:1px solid var(--line);padding-top:10px;}

  /* KPI cards (dark, unchanged style) */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px;margin-bottom:14px;display:grid;grid-template-columns:104px 1fr;gap:16px;align-items:center;}
  @media (max-width:480px){.card{grid-template-columns:1fr;} .gauge-wrap{justify-self:center;}}
  .gauge-wrap{position:relative;width:104px;height:104px;}
  .gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .gauge-num{font-family:var(--mono);font-weight:700;font-size:22px;line-height:1;}
  .gauge-target{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono);}
  .card-body{min-width:0;}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
  .card-title{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.01em;}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;}
  .icon-btn:hover{color:var(--text);}
  .status-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;}
  .status-good{background:var(--good-bg);color:var(--good);}
  .status-warn{background:var(--warn-bg);color:var(--warn);}
  .status-bad{background:var(--bad-bg);color:var(--bad);}
  .metrics-row{display:flex;gap:8px;margin-bottom:10px;}
  .metric{flex:1;background:var(--surface-2);border-radius:10px;padding:8px 8px;text-align:center;}
  .metric .num{font-family:var(--mono);font-size:17px;font-weight:700;line-height:1.1;}
  .metric .lbl{font-size:9.5px;color:var(--muted);margin-top:3px;}
  .counter-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .counter-label{font-size:12px;color:var(--muted);}
  .counter-controls{display:flex;align-items:center;gap:8px;}
  .step-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--surface-2);font-size:16px;font-weight:700;cursor:pointer;color:var(--text);}
  .step-btn:hover{background:var(--line);}
  .today-count{font-family:var(--mono);font-size:16px;font-weight:700;min-width:26px;text-align:center;}

  /* Shared inputs */
  .input-row{display:flex;gap:8px;margin-bottom:16px;}
  .input-row input[type=text], .input-row input[type=email], .input-row input[type=password], .input-row textarea{
    flex:1;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:var(--sans);background:var(--surface);color:var(--text);
  }
  .input-row input:focus, .input-row textarea:focus{outline:none;border-color:var(--k0);}
  .mic-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:16px;cursor:pointer;flex-shrink:0;}
  .mic-btn:hover{color:var(--text);}
  .mic-btn.recording{background:var(--bad-bg);color:var(--bad);border-color:var(--bad);}

  .list-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
  .check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface-2);font-size:12px;}
  .check.done{background:var(--good);border-color:var(--good);color:#031014;box-shadow:0 0 8px rgba(74,250,196,.5);}
  .item-text{flex:1;font-size:14px;min-width:0;word-break:break-word;}
  .item-text.done{color:var(--muted);text-decoration:line-through;}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;flex-shrink:0;}
  .del-btn:hover{color:var(--bad);}

  .memo-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .memo-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .memo-time{font-size:10.5px;color:var(--muted);font-family:var(--mono);}
  .memo-text{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}

  .quick-memo{display:flex;gap:8px;margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--line);}
  .quick-memo input{flex:1;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--surface);color:var(--text);font-family:var(--sans);}
  .quick-memo input:focus{outline:none;border-color:var(--k0);}

  .reflect-q{margin-bottom:18px;}
  .reflect-q label{display:block;font-size:14.5px;font-weight:700;margin-bottom:8px;}
  .reflect-q textarea{width:100%;min-height:100px;border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-size:14px;font-family:var(--sans);background:var(--surface);color:var(--text);resize:vertical;}
  .reflect-q textarea:focus{outline:none;border-color:var(--k0);}
  .reflect-save-row{margin:6px 0 26px;}
  .reflect-save-row .btn{width:100%;padding:13px;font-size:14px;}
  .reflect-entry{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .reflect-date{font-size:11px;color:var(--k3);font-family:var(--mono);font-weight:700;margin-bottom:6px;}
  .reflect-content{font-size:13px;line-height:1.6;color:var(--muted);white-space:pre-wrap;word-break:break-word;margin-bottom:4px;}
  .reflect-content b{color:var(--text);}

  .overlay{position:fixed;inset:0;background:rgba(10,11,15,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;width:100%;max-width:360px;}
  .modal h2{font-family:var(--display);font-size:18px;margin:0 0 16px;font-weight:700;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:var(--sans);background:var(--surface-2);color:var(--text);}
  .field input:focus{outline:none;border-color:var(--k0);}
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .modal-actions button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  .btn-primary{background:linear-gradient(135deg, var(--k0), var(--k3));color:#0E1015;}
  .btn-secondary{background:var(--surface-2);color:var(--text);}
  .btn-danger{background:var(--bad-bg);color:var(--bad);}
  .memo-textarea{width:100%;min-height:220px;border:1px solid var(--line);border-radius:8px;padding:10px;font-family:var(--mono);font-size:12.5px;line-height:1.6;color:var(--text);resize:vertical;white-space:pre;background:var(--surface-2);}
  .copy-msg{font-size:11px;color:var(--good);margin-top:6px;height:14px;}
  .footnote{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;font-family:var(--mono);}

  /* Login */
  .login-wrap{max-width:340px;margin:70px auto 0;text-align:center;}
  .login-wrap .brand-mark{margin:0 auto 18px;}
  .login-wrap h1{font-family:var(--display);font-size:22px;margin-bottom:6px;}
  .login-wrap .tagline{font-size:12.5px;color:var(--muted);margin-bottom:28px;}
  .login-field{margin-bottom:12px;text-align:left;}
  .login-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .login-field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--surface);color:var(--text);font-family:var(--sans);}
  .login-field input:focus{outline:none;border-color:var(--k0);}
  .login-error{color:var(--bad);font-size:12.5px;margin:8px 0;min-height:16px;}
  .login-submit{width:100%;padding:12px;margin-top:8px;}

  .settings-row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .settings-label{font-size:13px;color:var(--muted);}
  .settings-value{font-size:13.5px;font-weight:600;}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="wrap" id="app"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://jqzmsjdrvyqgnkctdrri.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxem1zamRydnlxZ25rY3RkcnJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTYzNjAsImV4cCI6MjA5NzQzMjM2MH0.OSmwcyJh5qrBdm9XzmnScHVg4FQeJ8JbpaP2YKLrD_A';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const REFLECT_QUESTIONS = [
  '今日うまくいったことは?',
  '引っかかっていることや未解決のことは?',
  '明日やることは?',
  '今日の自分に一言。'
];
const PALETTE = ['#38E8FF','#8C7CFF','#7DF9E0','#5CC8FF','#6BFFB0','#FF6FD8'];

let session = null;
let currentView = 'login'; // login | hub | kpi | clarity
let clarityTab = 'tasks';  // tasks | memos | reflection | settings
let editingKpiId = null;
let loginError = '';

let kpis = [];
let kpiEntries = []; // {id,kpi_id,date,count}
let tasks = [];
let memos = [];
let reflections = [];
let minutesList = [];
let educationList = [];
let educationSchedule = [];
let educationSubTab = 'log'; // log | summary | schedule

function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowISO(){ return new Date().toISOString(); }
function currentMonthKey(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function monthInfo(){
  const d=new Date(); const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
  const total=daysInMonth(y,m); const remaining=total-day+1;
  return {y,m,day,total,remaining};
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }

/* ---------------- Auth ---------------- */
async function init(){
  const { data } = await supabase.auth.getSession();
  session = data.session;
  supabase.auth.onAuthStateChange((_event, s) => { session = s; });
  if(session){ currentView='hub'; await loadAllData(); }
  render();
}
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  loginError='';
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){ loginError = 'ログインできませんでした。メールアドレスとパスワードを確認してください。'; render(); return; }
  session = data.session;
  currentView = 'hub';
  await loadAllData();
  render();
}
async function doLogout(){
  await supabase.auth.signOut();
  session = null; currentView='login'; render();
}

/* ---------------- Data loading ---------------- */
async function loadAllData(){
  const uid = session.user.id;
  const [k, ke, t, m, r, mm, es, esc] = await Promise.all([
    supabase.from('kpis').select('*').eq('user_id', uid).order('created_at'),

    supabase.from('tasks').select('*').eq('user_id', uid).eq('date', todayISO()).order('created_at'),
    supabase.from('memos').select('*').eq('user_id', uid).order('time', {ascending:false}),

/* ---------------- KPI ---------------- */
function achievedFor(kpiId){ return kpiEntries.filter(e=>e.kpi_id===kpiId).reduce((s,e)=>s+e.count,0); }
function todayEntry(kpiId){ return kpiEntries.find(e=>e.kpi_id===kpiId && e.date===todayISO()); }
function statusFor(achieved, target, remaining, total){
  const elapsed = total-remaining+1; const expected = target*(elapsed/total);
  if(achieved>=target) return {cls:'good', label:'達成'};
  const diffRatio = (achieved-expected)/(target||1);
  if(diffRatio>=-0.03) return {cls:'good', label:'順調'};
  if(diffRatio>=-0.15) return {cls:'warn', label:'やや遅れ'};
  return {cls:'bad', label:'遅れ'};
}
function statusColor(cls){ return cls==='good'?'var(--good)':(cls==='warn'?'var(--warn)':'var(--bad)'); }
function buildGauge(pct, expectedPct, colorVar, accent){
  const size=104, cx=size/2, cy=size/2, r=42;
  const c=2*Math.PI*r; const arcFrac=0.75; const arcLen=c*arcFrac; const gapLen=c-arcLen;
  const clippedPct=Math.max(0,Math.min(100,pct));
  const fillLen=arcLen*(clippedPct/100);
  const rotation=135;
  const expClamped=Math.max(0,Math.min(100,expectedPct));
  const tickAngleDeg=rotation+arcFrac*360*(expClamped/100);
  const rad=(tickAngleDeg*Math.PI)/180;
  const tx1=cx+(r-7)*Math.cos(rad), ty1=cy+(r-7)*Math.sin(rad);
  const tx2=cx+(r+7)*Math.cos(rad), ty2=cy+(r+7)*Math.sin(rad);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${arcLen} ${gapLen}" transform="rotate(${rotation} ${cx} ${cy})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${accent}" stroke-width="8" stroke-linecap="round" opacity="0.28" stroke-dasharray="${arcLen} ${gapLen}" transform="rotate(${rotation} ${cx} ${cy})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colorVar}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${fillLen} ${c-fillLen}" transform="rotate(${rotation} ${cx} ${cy})" style="transition:stroke-dasharray .35s ease;"/>
    <line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="var(--muted)" stroke-width="2"/>
  </svg>`;
}
function renderKpiTab(info){
  if(kpis.length===0){
    return `<div class="empty">まだKPIが登録されていません。<br>「＋ KPI追加」から始めましょう。
      <div><button class="btn btn-fill" onclick="app_openKpiModal()" style="margin-top:14px;">＋ KPI追加</button></div></div>`;
  }
  let out='';
  kpis.forEach((kpi, idx)=>{
    const accent = PALETTE[idx % PALETTE.length];
    const achieved = achievedFor(kpi.id);
    const remainNeeded = Math.max(0, kpi.target-achieved);
    const perDay = info.remaining>0 ? (remainNeeded/info.remaining) : remainNeeded;
    const pct = Math.round((achieved/(kpi.target||1))*100);
    const elapsed = info.total-info.remaining+1;
    const expectedPct = (kpi.target||0)>0 ? Math.round(100*(elapsed/info.total)) : 0;
    const st = statusFor(achieved, kpi.target, info.remaining, info.total);
    const color = statusColor(st.cls);
    const tEntry = todayEntry(kpi.id);
    const tCount = tEntry ? tEntry.count : 0;
    out += `
    <div class="card hud-corners">
      <div class="gauge-wrap">${buildGauge(pct, expectedPct, color, accent)}
        <div class="gauge-center"><div class="gauge-num" style="color:${color};">${pct}%</div><div class="gauge-target">${achieved}/${kpi.target}</div></div></div>
      <div class="card-body">
        <div class="card-head">
          <div class="card-title" style="color:${accent};">${escapeHtml(kpi.name)}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="status-pill status-${st.cls}">${st.label}</span>
            <button class="icon-btn" onclick="app_openKpiModal('${kpi.id}')" title="編集">✎</button>
          </div>
        </div>
        <div class="metrics-row">
          <div class="metric"><div class="num">${achieved}</div><div class="lbl">現在の進捗</div></div>
          <div class="metric"><div class="num">${remainNeeded}</div><div class="lbl">残り件数</div></div>
          <div class="metric"><div class="num" style="color:${color};">${perDay.toFixed(1)}</div><div class="lbl">日当たり必要件数</div></div>
        </div>
        <div class="counter-row">
          <div class="counter-label">本日の実績</div>
          <div class="counter-controls">
            <button class="step-btn" onclick="app_bump('${kpi.id}', -1)">－</button>
            <div class="today-count">${tCount}</div>
            <button class="step-btn" onclick="app_bump('${kpi.id}', 1)">＋</button>
          </div>
        </div>
      </div>
    </div>`;
  });
  out += `<div class="footnote">稼働日はカレンダー通りに計算 ・ グレーの目盛りは本日時点の目安ペース</div>`;
  return out;
}
async function bump(kpiId, delta){
  const uid = session.user.id; const d = todayISO();
  let entry = kpiEntries.find(e=>e.kpi_id===kpiId && e.date===d);
  if(entry){
    const newCount = Math.max(0, entry.count+delta);
    const { error } = await supabase.from('kpi_entries').update({count:newCount}).eq('id', entry.id);
    if(!error) entry.count = newCount;
  } else if(delta>0){
    const { data, error } = await supabase.from('kpi_entries').insert({user_id:uid, kpi_id:kpiId, date:d, count:1}).select().single();
    if(!error) kpiEntries.push(data);
  }
  render();
}
function openKpiModal(kpiId){
  editingKpiId = kpiId || null;
  const existing = kpiId ? kpis.find(k=>k.id===kpiId) : null;
  const overlay = document.createElement('div'); overlay.className='overlay'; overlay.id='overlay';
  overlay.innerHTML = `
    <div class="modal hud-corners">
      <h2>${existing?'KPIを編集':'KPIを追加'}</h2>
      <div class="field"><label>KPI名</label><input id="f-name" type="text" placeholder="例: MNP" value="${existing?escapeHtml(existing.name):''}"></div>
      <div class="field"><label>月間目標件数</label><input id="f-target" type="number" min="0" placeholder="例: 30" value="${existing?existing.target:''}"></div>
      <div class="modal-actions">
        ${existing?`<button class="btn-danger" onclick="app_deleteKpi()">削除</button>`:''}
        <button class="btn-secondary" onclick="app_closeModal()">キャンセル</button>
        <button class="btn-primary" onclick="app_saveKpi()">保存</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('f-name').focus();
}
function closeModal(){ const o=document.getElementById('overlay'); if(o) o.remove(); editingKpiId=null; }
async function saveKpi(){
  const name = document.getElementById('f-name').value.trim();
  const target = parseInt(document.getElementById('f-target').value,10);
  if(!name || isNaN(target) || target<0){ alert('KPI名と目標件数を正しく入力してください'); return; }
  const uid = session.user.id;
  if(editingKpiId){
    const { error } = await supabase.from('kpis').update({name, target}).eq('id', editingKpiId);
    if(!error){ const k = kpis.find(k=>k.id===editingKpiId); k.name=name; k.target=target; }
  } else {
    const { data, error } = await supabase.from('kpis').insert({user_id:uid, name, target}).select().single();
    if(!error) kpis.push(data);
  }
  closeModal(); render();
}
async function deleteKpi(){
  if(!editingKpiId) return;
  if(!confirm('このKPIを削除しますか?記録した実績データも失われます。')) return;
  await supabase.from('kpis').delete().eq('id', editingKpiId);
  kpis = kpis.filter(k=>k.id!==editingKpiId);
  kpiEntries = kpiEntries.filter(e=>e.kpi_id!==editingKpiId);
  closeModal(); render();
}
function generateMemoText(){
  const info = monthInfo(); const today = new Date();
  const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
  let lines = [`${dateStr}時点の進捗`, `残り${info.remaining}日 / 全${info.total}日`, ''];
  if(kpis.length===0){ lines.push('(KPI未登録)'); }
  else{
    kpis.forEach(kpi=>{
      const achieved = achievedFor(kpi.id);
      const remainNeeded = Math.max(0, kpi.target-achieved);
      const perDay = info.remaining>0 ? (remainNeeded/info.remaining) : remainNeeded;
      const pct = Math.round((achieved/(kpi.target||1))*100);
      lines.push(`【${kpi.name}】`, `進捗: ${achieved}/${kpi.target}件(${pct}%)`, `残り: ${remainNeeded}件`, `日当たり必要件数: ${perDay.toFixed(1)}件`, '');
    });
  }
  return lines.join('\n').trim();
}
function openMemoModal(){
  const text = generateMemoText();
  const overlay = document.createElement('div'); overlay.className='overlay'; overlay.id='overlay';
  overlay.innerHTML = `
    <div class="modal hud-corners" style="max-width:420px;">
      <h2>メモ出力</h2>
      <textarea id="memo-text" class="memo-textarea" readonly>${escapeHtml(text)}</textarea>
      <div class="copy-msg" id="copy-msg"></div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="app_closeModal()">閉じる</button>
        <button class="btn-primary" onclick="app_copyMemo()">コピー</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('memo-text').select();
}
async function copyMemo(){
  const ta = document.getElementById('memo-text'); const msg = document.getElementById('copy-msg');
  ta.focus(); ta.select();
  let ok=false;
  try{ if(navigator.clipboard?.writeText){ await navigator.clipboard.writeText(ta.value); ok=true; } }catch(e){ ok=false; }
  if(!ok){ try{ ok = document.execCommand('copy'); }catch(e){ ok=false; } }
  msg.textContent = ok ? 'コピーしました' : 'コピーできませんでした。テキストを選択して手動でコピーしてください。';
  if(!ok) msg.style.color='var(--bad)';
}

async function addTask(){
  const input = document.getElementById('task-input');
  const text = input.value.trim(); if(!text) return;
  const uid = session.user.id;
  const { data, error } = await supabase.from('tasks').insert({user_id:uid, text, done:false, date:todayISO()}).select().single();
  if(!error){ tasks.push(data); input.value=''; render(); document.getElementById('task-input').focus(); }
}
async function toggleTask(id){
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const { error } = await supabase.from('tasks').update({done:!t.done}).eq('id', id);
  if(!error){ t.done = !t.done; render(); }
}
async function deleteTask(id){
  await supabase.from('tasks').delete().eq('id', id);
  tasks = tasks.filter(t=>t.id!==id); render();
}

function renderReflectionTab(){

    </div>`;
  });
  out += `<div class="reflect-save-row"><button class="btn btn-fill" onclick="app_saveReflection()">今日の振り返りを保存</button></div>`;
  const past = reflections.filter(r=>r.date!==t);
  if(past.length>0){
    out += `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">過去の振り返り</div>`;
    past.forEach(r=>{
      out += `<div class="reflect-entry"><div class="reflect-date">${r.date}</div>`;
      REFLECT_QUESTIONS.forEach((q,i)=>{
        if(r.answers && r.answers[i]) out += `<div class="reflect-content"><b>${q}</b><br>${escapeHtml(r.answers[i])}</div>`;
      });
      out += `</div>`;
    });
  }
  return out;
}
async function saveReflection(){
  const t = todayISO();
  const answers = REFLECT_QUESTIONS.map((_,i)=> document.getElementById(`reflect-a-${i}`).value.trim());
  const uid = session.user.id;
  const existing = reflections.find(r=>r.date===t);
  if(existing){
    const { error } = await supabase.from('reflections').update({answers, saved_at: nowISO()}).eq('id', existing.id);
    if(!error){ existing.answers = answers; }
  } else {
    const { data, error } = await supabase.from('reflections').insert({user_id:uid, date:t, answers}).select().single();
    if(!error) reflections.unshift(data);
  }
  render();
}

async function copyMinutesPrompt(){
  const transcript = document.getElementById('minutes-transcript').value.trim();
  const pastNotes = document.getElementById('minutes-past').value.trim();
  const msg = document.getElementById('minutes-prompt-copy-msg');
  if(!transcript){ alert('文字起こしテキストを入力してください'); return; }
  const prompt = buildMinutesPrompt(transcript, pastNotes);
  let ok=false;
  try{ if(navigator.clipboard?.writeText){ await navigator.clipboard.writeText(prompt); ok=true; } }catch(e){ ok=false; }
  if(!ok){
    const ta = document.createElement('textarea');
    ta.value = prompt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ ok = document.execCommand('copy'); }catch(e){ ok=false; }
    document.body.removeChild(ta);
  }
  msg.textContent = ok ? 'コピーしました。AIチャットに貼り付けてください' : 'コピーできませんでした';
}

/* ---------------- Education Share (教育の共有) ---------------- */
const EDUCATION_EXAMPLE = `【教育の共有】

◎実施日
 7/14

◎実施者
岩間

◎対象
田村さん

■テーマ 【第10章 新人研修テキスト】数字・評価理解

■目的 数字を「プレッシャー」や「ネガティブな基準」としてではなく、自分の成長を可視化するための「成長の指標」および「公平なものさし」として理解し、組織の目標達成に向けた優先順位を身につける。

■教育内容
① 数字は改善のための「事実」であり「公平なものさし」 数字は単なる実績報告ではなく、感覚を事実に置き換えて改善策を練るためのツールであることを伝えました。
 「頑張った」という主観的な感覚だけでは翌日の具体的な行動を変えられませんが、「10人に声をかけて1人座った」という事実があれば、改善のポイントが明確になります。
また、数字は理不尽な評価を防ぐための、自分を守るための指標でもあることを共有しました。

② 実行計画:組織での達成が最優先
営業戦略部における最優先目標は、会社から割り振られた「実行計画(新規MNPの総販売数)」の達成であることを説明しました。 個人の数字を追うことも大切ですが、それはあくまで「組織の実行計画達成の一部」です。自分一人で完結させるのではなく、誰が対応すれば成約率が高いかを考え、組織全体で利益を最大化する視点を持つことの重要性を伝えました。

③ IDとLTVの理解(質と長期価値)
* ID: 手続き内容ごとの評価指標であり、単純な件数だけでなく、端末付きなど「質」が評価される仕組みを共有しました。
* LTV(Life Time Value): 顧客生涯価値のことで、ひかり・でんき・クレジットカードなどの付帯商材が該当します。これらは目先の一件ではなく、解約防止や長期的な収益(ストックビジネス)に繋がる重要な指標であることを説明しました。

④ 数字の優先順位の徹底 現場で迷わないための優先順位を明確にしました。
1. 実行計画
2. ID
3. LTV  例えば、一人のお客様に2時間かけて完璧なLTV提案をしても、その間にチーム全体の実行計画(獲得件数)を落としてしまっては本末転倒です。 優先順位を間違えない判断が求められることを共有しました。 
⑤ 数字を「成長指標」として活用する 第8章で学んだ営業フロー(キャッチ→アンケート→ヒアリング→パス)に数字を当てはめることで、自分の弱点を客観的に分析する方法を伝えました。

* キャッチ数に対して着座が少ない = トークの切り口(第一声)が弱い
* パス数は多いが成約に至らない = ヒアリングや情報の整理(パスの質)が弱い  このように数字を見ることで、今何を克服すべきかが明確になり、成長を実感しやすくなることを説明しました。 

■教育中の反応
・変化 田村さんは、数字に対して「少しプレッシャーを感じる」と正直な心境を話してくれましたが、説明を通じて「自分を守るためのもの」「成長が見えやすくなるもの」というポジティブな側面を理解した様子でした。
 特に、具体的に自分の動きを数値化するために「最初は抽選券を何枚持つか決めておき、配った枚数で着座数を数える」といった、現場ですぐに実践できる具体的な計測方法についても前向きに検討していました。
また、自転車サポートなどの商材がLTVに含まれるのかといった、評価の仕組みについても積極的に質問がありました。

■まとめ 
数字を使いこなすことは、強い営業マンになるための必須条件です。 明日からは感覚で振り返るのではなく、「今日は何回着座になって、何件制約になったか」といった具体的な数字をメモに残し、それを元に振り返りを行ってみます!と前向きな発言をもらえました。`;

  if(document.getElementById('edu-instructor')) document.getElementById('edu-instructor').value = e.instructor || '';
  if(document.getElementById('edu-trainee')) document.getElementById('edu-trainee').value = e.trainee || '';
}
async function deleteEducation(id){
  await supabase.from('education_shares').delete().eq('id', id);
  educationList = educationList.filter(x=>x.id!==id); render();
}

/* ---------------- Voice input ---------------- */
function startVoice(targetId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('この環境では音声入力を利用できません'); return; }
  const btn = event.target;
  const rec = new SR();
  rec.lang='ja-JP'; rec.interimResults=false;
  btn.classList.add('recording');
  rec.onresult = (e)=>{ const text=e.results[0][0].transcript; const el=document.getElementById(targetId); el.value=(el.value?el.value+' ':'')+text; el.focus(); };
  rec.onerror = ()=>{ btn.classList.remove('recording'); };
  rec.onend = ()=>{ btn.classList.remove('recording'); };
  rec.start();
}

}
